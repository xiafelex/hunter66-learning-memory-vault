name: Weekly Review Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1"

jobs:
  build-weekly-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build weekly review draft
        run: python scripts/build_weekly_review.py
